<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takei.net 管理者ダッシュボード</title>
  <style>
    :root {
      --bg-color: #000000;
      --card-bg: #16181c;
      --border-color: #2f3336;
      --text-main: #e7e9ea;
      --text-sub: #71767b;
      --primary: #1d9bf0;
      --danger: #f4212e;
      --warning: #f59e0b;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding-bottom: 40px;
    }

    /* ヘッダー */
    header {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 18px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* コンテナ */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    /* タブ切り替え */
    .admin-tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* カード・セクション */
    .panel-section {
      display: none;
    }

    .panel-section.active {
      display: block;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 16px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* フォーム要素 */
    input[type="text"], textarea, select {
      width: 100%;
      background: #000;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      color: var(--text-main);
      font-size: 14px;
      margin-bottom: 12px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button.btn-submit {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    /* リスト＆テーブル（スマホ対応） */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 13px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
    }

    th {
      color: var(--text-sub);
    }

    /* バッジ */
    .badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
      display: inline-block;
    }
    .badge-user { background: #1e293b; color: #94a3b8; }
    .badge-banned { background: rgba(244, 33, 46, 0.2); color: var(--danger); }

    /* 操作ボタン */
    .btn-action {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-action.danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* 投稿監視用カード（スマホ表示向け） */
    .post-item {
      border-bottom: 1px solid var(--border-color);
      padding: 12px 0;
    }
    .post-item:last-child {
      border-bottom: none;
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 4px;
    }
    .post-body {
      font-size: 14px;
      margin-bottom: 8px;
      word-break: break-all;
    }

    /* ローディング */
    .loading {
      text-align: center;
      color: var(--text-sub);
      padding: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>⚙️ 管理者ダッシュボード</h1>
    <a href="index.html" style="color: var(--primary); text-decoration: none; font-size: 13px;">← アプリに戻る</a>
  </header>

  <div class="container">
    
    <!-- タブ切替ナビゲーション -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('announcement')">📢 お知らせ投稿</button>
      <button class="tab-btn" onclick="switchTab('users')">👥 ユーザー管理</button>
      <button class="tab-btn" onclick="switchTab('posts')">🗑️ 投稿削除/監視</button>
    </div>

    <!-- 1. お知らせ投稿パネル -->
    <div id="panel-announcement" class="panel-section active">
      <div class="card">
        <h2>新規お知らせ / Q&A 投稿</h2>
        <select id="announcement-category">
          <option value="patchnote">パッチノート（アップデート）</option>
          <option value="qa">Q&A・ヘルプ</option>
        </select>
        <input type="text" id="announcement-title" placeholder="タイトルを入力">
        <textarea id="announcement-content" placeholder="本文を入力..."></textarea>
        <button class="btn-submit" id="btn-send-announcement">送信する</button>
      </div>

      <div class="card">
        <h2>投稿済みお知らせ一覧</h2>
        <div id="announcement-list" class="loading">読み込み中...</div>
      </div>
    </div>

    <!-- 2. ユーザー管理パネル（BAN準備済み） -->
    <div id="panel-users" class="panel-section">
      <div class="card">
        <h2>登録ユーザー一覧</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>表示名 / ID</th>
                <th>ステータス</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <tr><td colspan="3" class="loading">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 3. 投稿監視・削除パネル -->
    <div id="panel-posts" class="panel-section">
      <div class="card">
        <h2>最近の投稿</h2>
        <div id="post-monitor-list" class="loading">読み込み中...</div>
      </div>
    </div>

  </div>

  <!-- JavaScript 処理部分 -->
  <script type="module" src="admin.js"></script>
</body>
</html>
