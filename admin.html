<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>takei.net plus - 管理者用総合パネル</title>
  <style>
    body {
      background-color: #0b0f19;
      color: #f3f4f6;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1 {
      border-bottom: 2px solid #1d9bf0;
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      color: #1d9bf0;
      text-decoration: none;
      font-weight: bold;
    }
    
    /* タブ切り替え */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #2f3e56;
      padding-bottom: 10px;
    }
    .tab-btn {
      background: #151f32;
      color: #71767b;
      border: 1px solid #2f3e56;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }
    .tab-btn.active {
      background: #1d9bf0;
      color: #fff;
      border-color: #1d9bf0;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    .search-box, .danger-zone {
      background: #151f32;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #2f3e56;
    }
    .danger-zone {
      border-color: #dc3545;
    }
    .search-box input {
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #2f3e56;
      background: #000;
      color: #fff;
      margin-right: 10px;
      width: 200px;
      margin-bottom: 10px;
    }
    button {
      background: #1d9bf0;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button.danger-btn {
      background: #dc3545;
    }
    button.danger-btn:hover {
      background: #bd2130;
    }
    button.warning-btn {
      background: #f59e0b;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #151f32;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #2f3e56;
    }
    th {
      background-color: #1e2d4a;
      color: #1d9bf0;
    }
    tr:hover {
      background-color: #1c2a43;
    }
    
    .badge {
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: #ef4444;
      border-radius: 50%;
      margin-left: 8px;
      display: none;
    }
    .error-msg {
      background: #fecaca;
      color: #991b1b;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">← アプリに戻る</a>
    <h1>
      <span>⚙️ 管理者専用総合パネル <span id="dm-alert-badge" class="badge"></span></span>
      <button id="btn-request-notif" style="font-size: 12px; background: #374151;">🔔 デスクトップ通知を有効にする</button>
    </h1>

    <!-- 接続エラー等が発生した場合の表示エリア -->
    <div id="connection-error" class="error-msg"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('tab-dm')">💬 DMログ監視</button>
      <button class="tab-btn" onclick="switchTab('tab-posts')">📝 全投稿管理</button>
      <button class="tab-btn" onclick="switchTab('tab-users')">👥 ユーザー凍結・管理</button>
    </div>

    <!-- TAB 1: DMログ -->
    <div id="tab-dm" class="tab-content active">
      <div class="search-box">
        <h3>DMログの検索・フィルタ</h3>
        <input type="text" id="search-sender" placeholder="送信者ID (部分一致可)">
        <input type="text" id="search-receiver" placeholder="受信者ID (部分一致可)">
        <input type="text" id="search-text" placeholder="メッセージ内容で検索">
        <button id="btn-search-dm">検索</button>
        <button id="btn-reset-dm" style="background:#4b5563;">リセット</button>
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>送信日時</th>
              <th>送信者ID (Sender)</th>
              <th>受信者ID (Receiver)</th>
              <th>メッセージ本文</th>
            </tr>
          </thead>
          <tbody id="dm-log-table-body">
            <tr>
              <td colspan="4" style="text-align: center; color: #71767b;">ログを読み込み中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TAB 2: 全投稿 -->
    <div id="tab-posts" class="tab-content">
      <div class="danger-zone">
        <h3>🚨 デンジャーゾーン（全投稿削除）</h3>
        <p>すべてのタイムライン投稿（posts）がデータベースから完全に消去されます。</p>
        <button class="danger-btn" id="btn-delete-all-posts">⚠️ すべての投稿を完全に削除する</button>
      </div>
      <h3>📝 投稿一覧（個別削除）</h3>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>投稿日時</th>
              <th>投稿者</th>
              <th>内容</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="posts-table-body">
            <tr>
              <td colspan="4" style="text-align: center; color: #71767b;">投稿を読み込み中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TAB 3: ユーザー管理 -->
    <div id="tab-users" class="tab-content">
      <div class="danger-zone">
        <h3>⚠️ 全アカウント一括凍結</h3>
        <p>管理者を除くすべての一般アカウントを一時的に凍結状態にします。</p>
        <button class="danger-btn" id="btn-freeze-all-users">🚨 全一般アカウントを凍結する</button>
        <button id="btn-unfreeze-all-users" style="background: #10b981; margin-left: 10px;">🔓 全アカウントの凍結を解除する</button>
      </div>
      <h3>👥 アカウント一覧</h3>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>ユーザーID</th>
              <th>UID</th>
              <th>ステータス</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <tr>
              <td colspan="4" style="text-align: center; color: #71767b;">ユーザーデータを読み込み中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 【重要】ここの設定値がアプリ本体（app.js）と同一か、今一度ご確認ください
    const firebaseConfig = {
      apiKey: "AIzaSyBdT1yWLsKQ8hyktm0TgCtkc3jLKlOVllY",
      authDomain: "takei-netplus.firebaseapp.com",
      databaseURL: "https://takei-netplus-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "takei-netplus",
      storageBucket: "takei-netplus.firebasestorage.app",
      messagingSenderId: "180284787102",
      appId: "1:180284787102:web:4c9880b6930f323a94ee8f",
      measurementId: "G-HM4ELHCT3V"
    };

    let app, db;
    try {
      app = initializeApp(firebaseConfig);
      db = getDatabase(app);
    } catch (e) {
      showError("Firebaseの初期化に失敗しました。設定情報を確認してください: " + e.message);
    }

    const DM_PATH = 'direct_messages'; 
    const USERS_PATH = 'users';
    const POSTS_PATH = 'posts';

    let allDMs = [];
    let rawUsersData = {}; 
    let usersMap = {}; 
    let firstLoadFinished = false;

    function showError(msg) {
      const errBox = document.getElementById('connection-error');
      errBox.style.display = 'block';
      errBox.textContent = msg;
    }

    // デスクトップ通知
    document.getElementById('btn-request-notif').onclick = () => {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') alert('通知が有効になりました。');
      });
    };

    // 1. ユーザー監視（安全対策付き）
    onValue(ref(db, USERS_PATH), (snapshot) => {
      try {
        rawUsersData = snapshot.val() || {};
        usersMap = {};
        Object.keys(rawUsersData).forEach(uid => {
          usersMap[uid] = rawUsersData[uid].userLoginId || "unknown";
        });
        renderUsersTable();
        loadAndParseDMs();
      } catch (err) {
        console.error("ユーザーパースエラー:", err);
        showError("ユーザーデータの取得中にエラーが発生しました。");
      }
    }, (error) => {
      console.error("ユーザー取得失敗:", error);
      showError("データベースの読み込み権限がありません。セキュリティルールを確認してください。");
    });

    // 2. DM監視（安全対策・空データ対応）
    function loadAndParseDMs() {
      onValue(ref(db, DM_PATH), (snapshot) => {
        try {
          const data = snapshot.val();
          const tempDMs = [];

          if (data) {
            Object.keys(data).forEach(roomKey => {
              const uids = roomKey.split("_");
              const thread = data[roomKey];
              if (thread && typeof thread === 'object') {
                Object.keys(thread).forEach(msgId => {
                  const msg = thread[msgId];
                  if (msg) {
                    const sUid = msg.senderId;
                    const rUid = uids.find(id => id !== sUid) || "unknown";
                    const senderLoginId = usersMap[sUid] || sUid || '不明';
                    const receiverLoginId = usersMap[rUid] || rUid || '不明';

                    tempDMs.push({
                      rawTimestamp: msg.createdAt || 0,
                      timestamp: msg.createdAt ? new Date(msg.createdAt).toLocaleString('ja-JP') : '不明',
                      senderId: senderLoginId,
                      receiverId: receiverLoginId,
                      text: msg.text || ''
                    });
                  }
                });
              }
            });
          }

          if (firstLoadFinished && tempDMs.length > allDMs.length) {
            triggerDMAlert();
          }
          
          allDMs = tempDMs;
          firstLoadFinished = true;
          renderDMLogs(allDMs);
        } catch (err) {
          console.error("DMパースエラー:", err);
        }
      }, (error) => {
        console.error("DM取得失敗:", error);
        document.getElementById('dm-log-table-body').innerHTML = `<tr><td colspan="4" style="text-align: center; color: #ef4444;">DMを取得できませんでした。</td></tr>`;
      });
    }

    function triggerDMAlert() {
      document.getElementById('dm-alert-badge').style.display = 'inline-block';
      document.title = "🔴 【新着DM】takei.net plus - 管理パネル";
      if (Notification.permission === 'granted') {
        new Notification("📬 新着メッセージを受信しました");
      }
    }

    function resetDMAlert() {
      document.getElementById('dm-alert-badge').style.display = 'none';
      document.title = "takei.net plus - 管理者用パネル";
    }

    function renderDMLogs(logs) {
      const tbody = document.getElementById('dm-log-table-body');
      tbody.innerHTML = '';
      if (logs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #71767b;">該当するDMログはありません。</td></tr>`;
        return;
      }
      logs.sort((a, b) => b.rawTimestamp - a.rawTimestamp);
      logs.forEach(log => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="white-space: nowrap;">${log.timestamp}</td>
          <td style="font-weight: bold; color: #1d9bf0;">@${log.senderId}</td>
          <td style="font-weight: bold; color: #10b981;">@${log.receiverId}</td>
          <td style="word-break: break-all;">${log.text}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 検索処理
    document.getElementById('btn-search-dm').onclick = () => {
      const senderFilter = document.getElementById('search-sender').value.toLowerCase().trim();
      const receiverFilter = document.getElementById('search-receiver').value.toLowerCase().trim();
      const textFilter = document.getElementById('search-text').value.toLowerCase().trim();
      const filtered = allDMs.filter(log => {
        return log.senderId.toLowerCase().includes(senderFilter) &&
               log.receiverId.toLowerCase().includes(receiverFilter) &&
               log.text.toLowerCase().includes(textFilter);
      });
      renderDMLogs(filtered);
    };

    document.getElementById('btn-reset-dm').onclick = () => {
      document.getElementById('search-sender').value = '';
      document.getElementById('search-receiver').value = '';
      document.getElementById('search-text').value = '';
      renderDMLogs(allDMs);
    };

    // 3. 投稿監視（安全対策・空データ対応）
    onValue(ref(db, POSTS_PATH), (snapshot) => {
      try {
        const postsData = snapshot.val();
        const tbody = document.getElementById('posts-table-body');
        tbody.innerHTML = '';

        if (!postsData) {
          tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #71767b;">投稿はありません。</td></tr>`;
          return;
        }

        const postsList = [];
        Object.keys(postsData).forEach(postId => {
          const post = postsData[postId];
          if (post) {
            postsList.push({
              id: postId,
              createdAt: post.createdAt || 0,
              timestamp: post.createdAt ? new Date(post.createdAt).toLocaleString('ja-JP') : '不明',
              userId: usersMap[post.userId] || post.userId || '不明',
              text: post.text || ''
            });
          }
        });

        postsList.sort((a, b) => b.createdAt - a.createdAt);
        postsList.forEach(post => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="white-space: nowrap;">${post.timestamp}</td>
            <td style="font-weight: bold; color: #1d9bf0;">@${post.userId}</td>
            <td style="word-break: break-all;">${post.text}</td>
            <td><button class="danger-btn" onclick="deletePost('${post.id}')">削除</button></td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error("投稿パースエラー:", err);
      }
    }, (error) => {
      console.error("投稿取得失敗:", error);
      document.getElementById('posts-table-body').innerHTML = `<tr><td colspan="4" style="text-align: center; color: #ef4444;">投稿を取得できませんでした。</td></tr>`;
    });

    window.deletePost = function(postId) {
      if (confirm("この投稿を本当に削除しますか？")) {
        remove(ref(db, `${POSTS_PATH}/${postId}`))
          .then(() => alert("投稿を削除しました。"))
          .catch(err => alert("削除に失敗しました: " + err.message));
      }
    };

    document.getElementById('btn-delete-all-posts').onclick = () => {
      if (confirm("🚨 本当にすべての投稿を完全に消去しますか？")) {
        remove(ref(db, POSTS_PATH))
          .then(() => alert("すべての投稿を削除しました。"))
          .catch(err => alert("全消去に失敗しました: " + err.message));
      }
    };

    // 4. ユーザー表示
    function renderUsersTable() {
      const tbody = document.getElementById('users-table-body');
      tbody.innerHTML = '';
      const uids = Object.keys(rawUsersData);
      if (uids.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #71767b;">登録ユーザーはいません。</td></tr>`;
        return;
      }
      uids.forEach(uid => {
        const user = rawUsersData[uid];
        const loginId = user.userLoginId || "未設定";
        const isFrozen = user.status === 'frozen';
        const statusText = isFrozen ? "❌ 凍結中" : "🟢 アクティブ";

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-weight: bold;">@${loginId}</td>
          <td style="font-size: 12px; color: #71767b;">${uid}</td>
          <td style="color: ${isFrozen ? '#ef4444' : '#10b981'}">${statusText}</td>
          <td>
            ${isFrozen ? 
              `<button style="background:#10b981;" onclick="toggleFreeze('${uid}', false)">凍結解除</button>` : 
              `<button class="warning-btn" onclick="toggleFreeze('${uid}', true)">凍結する</button>`
            }
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.toggleFreeze = function(uid, shouldFreeze) {
      const status = shouldFreeze ? 'frozen' : 'active';
      update(ref(db, `${USERS_PATH}/${uid}`), { status: status })
        .then(() => alert(`ユーザーを ${status} に変更しました。`))
        .catch(err => alert("エラー: " + err.message));
    };

    document.getElementById('btn-freeze-all-users').onclick = () => {
      if (confirm("⚠️ すべての一般アカウントを凍結しますか？")) {
        const updates = {};
        Object.keys(rawUsersData).forEach(uid => {
          updates[`${USERS_PATH}/${uid}/status`] = 'frozen';
        });
        update(ref(db), updates)
          .then(() => alert("一括凍結しました。"))
          .catch(err => alert("エラー: " + err.message));
      }
    };

    document.getElementById('btn-unfreeze-all-users').onclick = () => {
      if (confirm("すべての一般アカウントの凍結を解除しますか？")) {
        const updates = {};
        Object.keys(rawUsersData).forEach(uid => {
          updates[`${USERS_PATH}/${uid}/status`] = 'active';
        });
        update(ref(db), updates)
          .then(() => alert("一括解除しました。"))
          .catch(err => alert("エラー: " + err.message));
      }
    };

    window.switchTab = function(tabId) {
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
      if (tabId === 'tab-dm') resetDMAlert();
    };
  </script>
</body>
</html>
