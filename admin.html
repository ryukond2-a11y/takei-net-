<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takei.net 管理者ダッシュボード</title>
  <style>
    :root {
      --bg-color: #000000;
      --card-bg: #16181c;
      --border-color: #2f3336;
      --text-main: #e7e9ea;
      --text-sub: #71767b;
      --primary: #1d9bf0;
      --danger: #f4212e;
      --warning: #f59e0b;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding-bottom: 40px;
    }

    /* ヘッダー */
    header {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 18px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* コンテナ */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    /* タブ切り替え */
    .admin-tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* カード・セクション */
    .panel-section {
      display: none;
    }

    .panel-section.active {
      display: block;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 16px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* フォーム要素 */
    input[type="text"], textarea, select {
      width: 100%;
      background: #000;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      color: var(--text-main);
      font-size: 14px;
      margin-bottom: 12px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button.btn-submit {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    /* リスト＆テーブル（スマホ対応） */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 13px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
    }

    th {
      color: var(--text-sub);
    }

    /* バッジ */
    .badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
      display: inline-block;
    }
    .badge-user { background: #1e293b; color: #94a3b8; }
    .badge-banned { background: rgba(244, 33, 46, 0.2); color: var(--danger); }

    /* 操作ボタン */
    .btn-action {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-action.danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* 投稿監視用カード（スマホ表示向け） */
    .post-item {
      border-bottom: 1px solid var(--border-color);
      padding: 12px 0;
    }
    .post-item:last-child {
      border-bottom: none;
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 4px;
    }
    .post-body {
      font-size: 14px;
      margin-bottom: 8px;
      word-break: break-all;
    }

    /* ローディング */
    .loading {
      text-align: center;
      color: var(--text-sub);
      padding: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>⚙️ 管理者ダッシュボード</h1>
    <a href="index.html" style="color: var(--primary); text-decoration: none; font-size: 13px;">← アプリに戻る</a>
  </header>

  <div class="container">
    
    <!-- タブ切替ナビゲーション -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('announcement')">📢 お知らせ投稿</button>
      <button class="tab-btn" onclick="switchTab('users')">👥 ユーザー管理</button>
      <button class="tab-btn" onclick="switchTab('posts')">🗑️ 投稿削除/監視</button>
    </div>

    <!-- 1. お知らせ投稿パネル -->
    <div id="panel-announcement" class="panel-section active">
      <div class="card">
        <h2>新規お知らせ / Q&A 投稿</h2>
        <select id="announcement-category">
          <option value="patchnote">パッチノート（アップデート）</option>
          <option value="qa">Q&A・ヘルプ</option>
        </select>
        <input type="text" id="announcement-title" placeholder="タイトルを入力">
        <textarea id="announcement-content" placeholder="本文を入力..."></textarea>
        <button class="btn-submit" id="btn-send-announcement">送信する</button>
      </div>

      <div class="card">
        <h2>投稿済みお知らせ一覧</h2>
        <div id="announcement-list" class="loading">読み込み中...</div>
      </div>
    </div>

    <!-- 2. ユーザー管理パネル -->
    <div id="panel-users" class="panel-section">
      <div class="card">
        <h2>登録ユーザー一覧</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>表示名 / ID</th>
                <th>ステータス</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <tr><td colspan="3" class="loading">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 3. 投稿監視・削除パネル -->
    <div id="panel-posts" class="panel-section">
      <div class="card">
        <h2>最近の投稿</h2>
        <div id="post-monitor-list" class="loading">読み込み中...</div>
      </div>
    </div>

  </div>

  <!-- JavaScript 埋め込み部分 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getDatabase, ref, onValue, push, set, remove 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { 
      getAuth, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBdT1yWLsKQ8hyktm0TgCtkc3jLKlOVllY",
      authDomain: "takei-netplus.firebaseapp.com",
      databaseURL: "https://takei-netplus-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "takei-netplus",
      storageBucket: "takei-netplus.firebasestorage.app",
      messagingSenderId: "180284787102",
      appId: "1:180284787102:web:4c9880b6930f323a94ee8f",
      measurementId: "G-HM4ELHCT3V"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // タブ切替処理
    window.switchTab = function(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.panel-section').forEach(panel => panel.classList.remove('active'));

      event.target.classList.add('active');
      document.getElementById(`panel-${tabName}`).classList.add('active');
    };

    // 🔐 認証チェック後、データを読み込み
    onAuthStateChanged(auth, (user) => {
      if (user) {
        console.log("管理者認証OK:", user.uid);
        loadAnnouncements();
        loadUsers();
        loadPosts();
      } else {
        alert("管理者アクセスにはログインが必要です。");
        window.location.href = "index.html";
      }
    });

    // 1. お知らせの作成・一覧読み込み
    document.getElementById('btn-send-announcement')?.addEventListener('click', async () => {
      const category = document.getElementById('announcement-category').value;
      const title = document.getElementById('announcement-title').value.trim();
      const content = document.getElementById('announcement-content').value.trim();

      if (!title || !content) {
        alert("タイトルと本文を入力してください。");
        return;
      }

      try {
        const newRef = push(ref(db, 'announcements'));
        await set(newRef, {
          category: category,
          title: title,
          content: content,
          createdAt: Date.now()
        });

        alert("お知らせを投稿しました！");
        document.getElementById('announcement-title').value = '';
        document.getElementById('announcement-content').value = '';
      } catch (e) {
        alert("投稿失敗: " + e.message);
      }
    });

    function loadAnnouncements() {
      onValue(ref(db, 'announcements'), (snap) => {
        const listEl = document.getElementById('announcement-list');
        const data = snap.val();
        if (!data) {
          listEl.innerHTML = '<p style="color:var(--text-sub); text-align:center;">なし</p>';
          return;
        }

        listEl.innerHTML = '';
        Object.keys(data).reverse().forEach(id => {
          const item = data[id];
          const div = document.createElement('div');
          div.className = 'post-item';
          div.innerHTML = `
            <div class="post-header">
              <span>[${item.category === 'patchnote' ? 'パッチ' : 'Q&A'}] ${item.title}</span>
              <button class="btn-action danger" onclick="deleteAnnouncement('${id}')">削除</button>
            </div>
            <div class="post-body">${item.content}</div>
          `;
          listEl.appendChild(div);
        });
      });
    }

    window.deleteAnnouncement = function(id) {
      if (confirm("このお知らせを削除しますか？")) {
        remove(ref(db, `announcements/${id}`));
      }
    };

    // 2. ユーザー一覧読み込み＆BAN処理
    function loadUsers() {
      onValue(ref(db, 'users'), (snap) => {
        const tbody = document.getElementById('user-table-body');
        const data = snap.val();
        if (!data) {
          tbody.innerHTML = '<tr><td colspan="3">ユーザーがいません</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        Object.keys(data).forEach(uid => {
          const u = data[uid];
          const tr = document.createElement('tr');
          const isBanned = u.isBanned || false;

          tr.innerHTML = `
            <td>
              <div style="font-weight:bold;">${u.displayName || '名無し'}</div>
              <div style="color:var(--text-sub); font-size:11px;">@${u.userLoginId || 'unknown'}</div>
            </td>
            <td>
              <span class="badge ${isBanned ? 'badge-banned' : 'badge-user'}">
                ${isBanned ? 'BAN中' : '正常'}
              </span>
            </td>
            <td>
              <button class="btn-action ${isBanned ? '' : 'danger'}" onclick="toggleBan('${uid}', ${isBanned})">
                ${isBanned ? '解除' : 'BAN'}
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      });
    }

    window.toggleBan = async function(uid, currentStatus) {
      const nextStatus = !currentStatus;
      const actionText = nextStatus ? "アカウントをBAN（利用停止）" : "BANを解除";
      
      if (confirm(`このユーザーを${actionText}しますか？`)) {
        await set(ref(db, `users/${uid}/isBanned`), nextStatus);
        alert(`${actionText}しました。`);
      }
    };

    // 3. 投稿一覧・不適切な投稿の即時削除
    function loadPosts() {
      onValue(ref(db, 'posts'), (snap) => {
        const container = document.getElementById('post-monitor-list');
        const data = snap.val();
        if (!data) {
          container.innerHTML = '<p style="color:var(--text-sub); text-align:center;">投稿がありません</p>';
          return;
        }

        container.innerHTML = '';
        const posts = Object.keys(data).map(k => ({ id: k, ...data[k] })).sort((a, b) => b.createdAt - a.createdAt);

        posts.slice(0, 30).forEach(post => {
          const div = document.createElement('div');
          div.className = 'post-item';
          div.innerHTML = `
            <div class="post-header">
              <span>投稿ID: ${post.id.slice(-6)} (${post.category || 'general'})</span>
              <button class="btn-action danger" onclick="deletePost('${post.id}')">削除</button>
            </div>
            <div class="post-body">${post.content}</div>
          `;
          container.appendChild(div);
        });
      });
    }

    window.deletePost = function(postId) {
      if (confirm("この投稿を削除しますか？")) {
        remove(ref(db, `posts/${postId}`));
      }
    };
  </script>
</body>
</html>
