<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>takei.net plus</title>
  <link rel="stylesheet" href="style.css"> <!-- スタイルシートのパスを合わせてね -->
</head>
<body>

  <!-- 🔐 認証画面 -->
  <div id="auth-gateway" class="card-container" style="display: flex;">
    <!-- ログインカード -->
    <div id="login-card" class="card">
      <h2>ログイン</h2>
      <input type="email" id="login-email" placeholder="メールアドレス">
      <input type="password" id="login-password" placeholder="パスワード">
      <button id="btn-login">ログイン</button>
      <p><span id="to-signup" style="color: #1d9bf0; cursor: pointer;">新規登録はこちら</span></p>
    </div>
    <!-- 新規登録カード -->
    <div id="signup-card" class="card" style="display: none;">
      <h2>新規登録</h2>
      <input type="text" id="signup-name" placeholder="表示名">
      <input type="text" id="signup-name-roman" placeholder="ログインID (英数字)">
      <input type="email" id="signup-email" placeholder="メールアドレス">
      <input type="password" id="signup-password" placeholder="パスワード">
      <input type="file" id="signup-avatar-file" accept="image/*">
      <button id="btn-signup">登録する</button>
      <p><span id="to-login" style="color: #1d9bf0; cursor: pointer;">ログインはこちら</span></p>
    </div>
  </div>

  <!-- 📱 メインアプリ画面 -->
  <div id="app-container" style="display: none;">
    <!-- 左サイドバー（ナビゲーション） -->
    <aside class="sidebar">
      <div id="current-user-avatar" class="avatar" style="width: 40px; height: 40px; border-radius: 50%; cursor: pointer;">🧪</div>
      <nav>
        <button id="nav-home">🏠 ホーム</button>
        <button id="nav-notifications">🔔 通知 <span id="notif-badge" style="display: none; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px;">0</span></button>
        <button id="nav-dms">💬 メッセージ</button>
      </nav>
      <button id="btn-logout" style="margin-top: auto;">ログアウト</button>
    </aside>

    <!-- メインコンテンツエリア -->
    <main class="main-content">
      <header class="main-header">
        <h1 id="page-title">ホーム</h1>
      </header>

      <!-- 📝 投稿作成エリア（ホームでのみ表示） -->
      <div id="global-tweet-box" class="tweet-box">
        <textarea id="post-input" placeholder="いまどうしてる？" rows="3"></textarea>
        <!-- 引用プレビュー表示枠 -->
        <div id="quote-preview" style="display: none; background: #2f3336; padding: 8px; border-radius: 8px; margin-bottom: 8px; position: relative;">
          <span id="quote-preview-content" style="font-size: 12px; color: #71767b;"></span>
          <button id="close-quote-preview" style="position: absolute; right: 8px; top: 8px; background: none; border: none; color: white; cursor: pointer;">×</button>
        </div>
        <button id="submit-post">投稿する</button>
      </div>

      <!-- タイムラインエリア -->
      <div id="timeline"></div>

      <!-- 🧵 スレッド詳細表示エリア（デフォルト非表示） -->
      <div id="thread-detail-container" style="display: none;">
        <button id="btn-back-to-home" style="margin-bottom: 10px;">← タイムラインに戻る</button>
        <div id="thread-main-post"></div>
        <div style="border-bottom: 1px solid #2f3336; padding: 10px 0; font-weight: bold;">返信一覧</div>
        <div id="thread-replies-list"></div>
      </div>

      <!-- 🔔 通知タイムライン（デフォルト非表示） -->
      <div id="notification-timeline" style="display: none;"></div>

      <!-- 💬 DM（ダイレクトメッセージ）エリア（デフォルト非表示） -->
      <div id="dm-content" style="display: none;">
        <!-- ユーザー一覧 -->
        <div id="dm-users-list">
          <h3 style="padding: 10px;">チャットする相手を選択</h3>
          <div id="dm-users-container"></div>
        </div>
        <!-- チャットウィンドウ -->
        <div id="dm-chat-window" style="display: none; flex-direction: column; height: calc(100vh - 120px);">
          <div style="display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #2f3336;">
            <button id="btn-back-to-dm-users" style="margin-right: 10px;">← 戻る</button>
            <span id="dm-chat-partner-name" style="font-weight: bold; color: white;"></span>
          </div>
          <div id="dm-messages-container" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 10px; gap: 8px;"></div>
          <div style="display: flex; padding: 10px; border-top: 1px solid #2f3336;">
            <input type="text" id="dm-input" placeholder="メッセージを入力..." style="flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #2f3336; background: #000; color: white;">
            <button id="btn-send-dm" style="margin-left: 8px; border-radius: 50%; width: 40px; height: 40px; padding: 0;">🚀</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 👥 プロフィール詳細モーダル -->
  <div id="user-details-modal" class="modal-backdrop" style="display: none;">
    <div class="modal">
      <div id="details-avatar" class="avatar" style="width: 70px; height: 70px; border-radius: 50%; font-size: 32px; display: flex; align-items: center; justify-content: center;">🧪</div>
      <h2 id="details-display-name"></h2>
      <p id="details-login-id" style="color: #71767b;"></p>
      <p id="details-bio" style="margin: 10px 0; line-break: anywhere;"></p>
      <p style="font-size: 12px; color: #71767b;">登録日: <span id="details-created-at"></span></p>
      <button id="btn-open-edit-from-details" style="display: none; margin-top: 10px;">プロフィールを編集</button>
      <div style="border-top: 1px solid #2f3336; margin-top: 15px; padding-top: 10px;">
        <h3>過去の投稿</h3>
        <div id="details-posts-list"></div>
      </div>
      <button id="close-user-details-modal" style="margin-top: 15px; background: #555;">閉じる</button>
    </div>
  </div>

  <!-- 📝 プロフィール編集モーダル -->
  <div id="profile-modal" class="modal-backdrop" style="display: none;">
    <div class="modal">
      <h2>プロフィール編集</h2>
      <input type="text" id="edit-display-name" placeholder="名前">
      <textarea id="edit-bio" placeholder="自己紹介 (説明欄)" rows="3"></textarea>
      <input type="file" id="edit-avatar-file" accept="image/*">
      <button id="btn-save-profile">保存する</button>
      <button id="close-profile-modal" style="margin-top: 10px; background: #555;">キャンセル</button>
    </div>
  </div>

  <!-- 💬 返信（スレッドモーダル） -->
  <div id="reply-modal" class="modal-backdrop" style="display: none;">
    <div class="modal">
      <h3>返信する</h3>
      <p id="reply-target-post-content" style="color: #71767b; font-size: 13px; margin-bottom: 10px; line-break: anywhere;"></p>
      <textarea id="reply-input" placeholder="返信をツイート" rows="3"></textarea>
      <button id="submit-reply">返信する</button>
      <button id="close-reply-modal" style="margin-top: 10px; background: #555;">キャンセル</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
